name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run package:win

      - uses: actions/upload-artifact@v4
        with:
          name: wavebox-windows
          path: dist/**
